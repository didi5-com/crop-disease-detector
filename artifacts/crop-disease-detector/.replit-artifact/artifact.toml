kind = "web"
previewPath = "/"
title = "Crop Disease Detector"
version = "1.0.0"
id = "artifacts/crop-disease-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19879

[services.development]
run = "pnpm --filter @workspace/crop-disease-detector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crop-disease-detector", "run", "build" ]
publicDir = "artifacts/crop-disease-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19879"
BASE_PATH = "/"
